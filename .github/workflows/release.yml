name: release

# 推送 v* tag 触发：构建预编译二进制并挂到对应 tag 的 GitHub Release。
# 也可在 Actions 页面手动 dispatch 来测试构建（不会发 release）。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # 静态 Linux 二进制（rustls + 自带 SQLite，无动态依赖，适合容器/通用）
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            asset: model-bridge-linux-amd64
          # Windows
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            asset: model-bridge-windows-amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # tag 触发时把 Cargo.toml 版本写成 tag 名并同步 Cargo.lock，使发布二进制的
      # --version 与 tag 一致；本地无需手动 bump。dispatch（无 tag）跳过，按仓库
      # 现状构建。sed 只匹配 [package] 下以 version = 开头的行（依赖行以 crate 名开头）。
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          cargo update -p model-bridge --precise "$VERSION"
          echo "Building model-bridge $VERSION"

      # 二进制在编译期通过 include_dir! 嵌入 web/dist，必须先构建前端。
      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install musl toolchain (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build binary
        env:
          # ring / libsqlite3 的 C 代码用 musl-gcc 编译：cc-rs 默认找
          # x86_64-linux-musl-gcc，runner 上没有该名字，故显式指向 musl-gcc。
          # 链接走 rustc 默认的 self-contained musl（rust-lld + 内置 musl CRT）。
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        # -C 切换目录后按叶子名归档，故二进制与模板都落在归档根目录。
        run: tar -czf ${{ matrix.asset }}.tar.gz -C target/${{ matrix.target }}/release model-bridge -C "$GITHUB_WORKSPACE" model-bridge.toml.example

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        # Compress-Archive 按叶子名扁平归档，两文件均落在 zip 根目录。
        run: Compress-Archive -Path target/${{ matrix.target }}/release/model-bridge.exe, model-bridge.toml.example -DestinationPath ${{ matrix.asset }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.${{ matrix.archive }}

  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
